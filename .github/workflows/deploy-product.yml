# ==============================================================================
# Pipeline 1: Deploy Produto (API + Worker)
# ==============================================================================
# Trigger: push para main com mudanças em src/, requirements ou Dockerfile
# Steps:  teste → build GHCR → SSH deploy VPS → health check
# Imagem: ghcr.io/afborda/synthlab-api:latest (privado)
# ==============================================================================

name: Deploy Product (API + Worker)

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'api/**'
      - 'requirements*.txt'
      - 'Dockerfile'
      - 'Dockerfile.server'
      - 'docker-compose*.yml'
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests (emergency deploy only)'
        required: false
        default: 'false'
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: afborda/synthlab-api

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Testes
  # ---------------------------------------------------------------------------
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_tests != 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-api.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short -q

      - name: Schema smoke-test
        run: python check_schema.py 2>/dev/null || true

  # ---------------------------------------------------------------------------
  # Job 2: Build e push imagem Docker para GHCR
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & Push to GHCR
    needs: test
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Job 3: Deploy na VPS via SSH
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          timeout: 120s
          script: |
            set -euo pipefail
            cd /opt/synthlab/services

            # Autenticar no GHCR
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u afborda --password-stdin

            # Pull da nova imagem
            docker compose -f docker-compose.services.yml pull api worker

            # Restart sem downtime (Traefik health check)
            docker compose -f docker-compose.services.yml up -d --no-deps api worker beat

            # Cleanup de imagens antigas (>24h)
            docker image prune -af --filter "until=24h"

            # Health check — aguarda API responder
            sleep 8
            curl -sf http://localhost:8000/health || (
              echo "❌ Health check falhou — rollback necessário"
              docker compose -f docker-compose.services.yml logs --tail=50 api
              exit 1
            )

            echo "✅ Deploy concluído: $(date '+%Y-%m-%d %H:%M:%S')"
            echo "   Imagem: ghcr.io/afborda/synthlab-api:${{ needs.build-and-push.outputs.image_tag }}"
