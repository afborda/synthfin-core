# ==============================================================================
# Pipeline 3: Deploy Infra (configs/segurança)
# ==============================================================================
# Trigger: push para main com mudanças em security/, traefik/, services/, monitoring/
# ATENÇÃO: NÃO faz Docker build — apenas aplica configs na VPS via SSH
# REGRA DE SEGURANÇA: Nunca executar em PRs de terceiros. Só push direto por maintainers.
# ==============================================================================

name: Deploy Infra (configs/security)

on:
  push:
    branches: [main]
    paths:
      - 'security/**'
      - 'traefik/**'
      - 'services/**'
      - 'monitoring/**'
      - 'backup/**'
  workflow_dispatch:
    inputs:
      component:
        description: 'Component to redeploy (all, traefik, services, monitoring)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - traefik
          - services
          - monitoring

# Apenas maintainers podem executar push direto para main.
# PRs de forks nunca chegam a main sem review — a proteção de branch é a defesa primária.
# Esse workflow nunca deve ter o trigger `pull_request`.
concurrency:
  group: infra-deploy
  cancel-in-progress: false  # Nunca cancelar deploy de infra em andamento

jobs:
  deploy:
    name: Apply Infra Configs to VPS
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Apply configs to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          timeout: 120s
          script: |
            set -euo pipefail
            cd /opt/synthlab-infra

            # Sincronizar repositório de infra
            git pull origin main

            COMPONENT="${{ github.event.inputs.component || 'all' }}"

            # --- Traefik (reverse proxy + SSL) ---
            if [[ "$COMPONENT" == "all" || "$COMPONENT" == "traefik" ]]; then
              echo "🔄 Recarregando Traefik..."
              docker compose -f traefik/docker-compose.traefik.yml up -d
              echo "✅ Traefik recarregado"
            fi

            # --- Services (API, Worker, Beat, PostgreSQL, Redis, MinIO) ---
            if [[ "$COMPONENT" == "all" || "$COMPONENT" == "services" ]]; then
              echo "🔄 Atualizando services..."
              docker compose -f services/docker-compose.services.yml up -d
              echo "✅ Services atualizados"
            fi

            # --- Monitoring (Prometheus + Grafana) ---
            if [[ "$COMPONENT" == "all" || "$COMPONENT" == "monitoring" ]]; then
              echo "🔄 Atualizando monitoring..."
              docker compose -f monitoring/docker-compose.monitoring.yml up -d
              echo "✅ Monitoring atualizado"
            fi

            # --- fail2ban (sempre recarregar para aplicar novos jails) ---
            if [[ "$COMPONENT" == "all" ]]; then
              echo "🔄 Recarregando fail2ban..."
              sudo systemctl reload fail2ban 2>/dev/null || true
            fi

            # --- Auditoria de segurança pós-deploy ---
            bash security/audit-security.sh

            echo "✅ Infra deploy concluído: $(date '+%Y-%m-%d %H:%M:%S')"
            echo "   Componente: $COMPONENT"
            echo "   Commit: ${{ github.sha }}"
